<html><head>
	<title>EinfachTobi Server - Official Website</title>
	<meta name="description" content="Einfach Tobi Server. IP: 'minecraft.einfachtobi.com'.">
	<meta name="keywords" content="EinfachTobi Server, einfachtobi.com, Minecraft Server, Minecraft, Fun, Play, Info, Website, Official">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta charset="utf-8">
	<link rel="stylesheet" href="css/stylesheet.css">
	<link rel="stylesheet" href="css/home.css">
	<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lato:100,300,regular,700,900" type="text/css">
	<script src="https://cdn.rawgit.com/leonardosnt/mc-player-counter/1.1.0/dist/mc-player-counter.min.js"></script>
	<link rel="icon" href="/favicon.ico" type="image/x-icon" />
</head>
<body>
	<div class="container">
		<header>
			<div class="header">
				<div class="logo">
					<!-- In the img folder, upload your logo. -->
					<!-- Make sure to name it 'logo.png'! -->
					<a href="https://twitter.com/Einfach_Tobi" target="_blank"><img src="img/logo.png" alt="EinfachTobi"></a>
				</div>
			</div>
			<h1 class="animate" style="display: block;">Willkommen!</h1>
			<div class="playercount">

				<p>Join <span data-playercounter-ip="minecraft.einfachtobi.com">
				0</span> other players on <span>minecraft.einfachtobi.com</span></p> 
				<script src="https://mcapi.us/scripts/minecraft.js"></script>
				<div class="server-status">
				The minecraft server is currently <span class="server-online"></span>!
				</div>
				<script>
				MinecraftAPI.getServerStatus('minecraft.einfachtobi.com', {
					port: 25565 // optional, only if you need a custom port
				}, function (err, status) {
					if (err) {
					return document.querySelector('.server-status').innerHTML = 'Error loading status';
					}

					// you can change these to your own message!
					document.querySelector('.server-online').innerHTML = status.online ? 'up' : 'down';
				});
				</script>
				</div>
			</div>
		</header>
	</div>
	
	
	
	<script src="https://code.jquery.com/jquery-1.11.2.min.js" type="text/javascript"></script>
	<script src="js/main.js" type="text/javascript"></script>
	
	<script src="//code.jquery.com/jquery-2.2.1.min.js"></script>
<script src="//momentjs.com/downloads/moment.min.js"></script>
<script src="//ujafedny.org/assets/bower_components/moment/locale/*.js"></script> 	<!-- Your preferred locale instead of * -->
<link href="//netdna.bootstrapcdn.com/font-awesome/4.0.3/css/font-awesome.css" rel="stylesheet">
<script>
var rq = 'https://mcapi.us/server/status?ip=minecraft.einfachtobi.com ';  	// <---- Your Minecraft server IP here; add &port=<port> if you are using a different port
var error = 'unknown';				// of 25565. For instance: https://mcapi.us/server/status?ip=s.nerd.nu&port=25565 
var classes = {					// more info in https://mcapi.us/
	error: "fa-question",
	false: "fa-times",
	true: "fa-check",
};
var allclasses = "";
for(i in classes) {
	allclasses += ' '+classes[i];
};
function q(addr, cb) {
	$.ajax({
		url: rq,
		type: 'GET',
		dataType: 'json',
		data: {ip: addr, players: true},
	})
	.done(function(data) {
		console.log("success");
		console.log(data);
		cb(data);
	})
	.fail(function(data) {
		console.log("error");
	})
	.always(function() {
	});
}
function setclass(o, c) {
	o.removeClass(allclasses);
	o.addClass(classes[c]);
	o.html('');
}
function settext(o, t) {
	o.removeClass(allclasses);
	o.html(t);
}
function display(data) {
	var np = $('#numplayers'),
	    version = $('#version'),
	    online = $('#online'),
	    motd = $('#motd'),
	    updated = $('#updated'),
	    d = new Date(data.last_updated*1000);
	moment.locale('*');				// The locale which you have used before.
	settext(updated, moment(d).fromNow());
	setclass(online, data.online);
    if (data.online) {
	settext(np, data.players.now);
	settext(version, data.server.name);
	settext(motd, data.motd);
    } else {
	setclass(np, error);
	setclass(version, error);
	setclass(motd, error);
    }
}
$(document).ready(function() {
	q('//lentium.xyz', display);
});
</script>

<style type="text/css" media="screen">
	.statusbox {
		min-width: 5em;
		min-height: 2em;
		border: 1px solid #999;
		border-radius: 1em;
		background-color: #eee;
		padding: 0.5em;
		margin: 0.5em;
	}
	.label {
		text-align: right;
		float: left;
		margin-right: 1em;
		min-width: 8em;
		color: #444;
	}
</style>

<div class="statusbox">
	<div class="label">Online: </div>
	<i id="online" class="fa fa-question"></i>
	<div class="label">Version: </div>
	<i id="version" class="fa fa-question"></i>
	<div class="label">MOTD: </div>
	<i id="motd" class="fa fa-question"></i>
	<div class="label">Players: </div>
	<i id="numplayers" class="fa fa-question"></i>
	<div class="label">Last Update: </div>
	<i id="updated" class="fa fa-question"></i>
</div>
	
	

</body></html>
