<html><head>
	<title>EinfachTobi Server - Official Website</title>
	<meta name="description" content="EinfachTobi Server. IP: 'minecraft.einfachtobi.com'.">
	<meta name="keywords" content="EinfachTobi Server, einfachtobi.com, Minecraft Server, Minecraft, Fun, Play, Info, Website, Official">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta charset="utf-8">
	<link rel="stylesheet" href="css/stylesheet.css">
	<link rel="stylesheet" href="css/home.css">
	<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Lato:100,300,regular,700,900" type="text/css">
	<script src="https://cdn.rawgit.com/leonardosnt/mc-player-counter/1.1.0/dist/mc-player-counter.min.js"></script>
	<link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
	<div class="container">
		<header>
			<div class="header">
				<div class="logo">
					<!-- In the img folder, upload your logo. -->
					<!-- Make sure to name it 'logo.png'! -->
					<a href="https://twitter.com/Einfach_Tobi" target="_blank"><img src="img/logo.png" alt="EinfachTobi"></a>
				</div>
			</div>
			<h1 class="animate" style="display: block;">Willkommen!</h1>
			<div class="playercount">

				<p>Join <span data-playercounter-ip="minecraft.einfachtobi.com">
				0</span> other players on <span>minecraft.einfachtobi.com</span></p> 
				<script src="https://mcapi.us/scripts/minecraft.js"></script>
				<div class="server-status">
				The minecraft server is currently <span class="server-online"></span>!
				</div>
				<script>
				MinecraftAPI.getServerStatus('minecraft.einfachtobi.com', {
					port: 25565 // optional, only if you need a custom port
				}, function (err, status) {
					if (err) {
					return document.querySelector('.server-status').innerHTML = 'Error loading status';
					}

					// you can change these to your own message!
					document.querySelector('.server-online').innerHTML = status.online ? 'up' : 'down';
				});
				</script>
				</div>
			</div>
		</header>
	</div>
	
	
	
	<script src="https://code.jquery.com/jquery-1.11.2.min.js" type="text/javascript"></script>
	<script src="js/main.js" type="text/javascript"></script>
	
	

</body></html>
